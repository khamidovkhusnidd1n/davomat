name: Build Flutter APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Generate Flutter Platform Folders (Android/iOS)
        working-directory: ./teacher_app
        run: flutter create .

      - name: Inject Internet Permission
        working-directory: ./teacher_app
        run: |
          sed -i 's/<application/<uses-permission android:name="android.permission.INTERNET"\/>\n    <application/' android/app/src/main/AndroidManifest.xml

      - name: Get Flutter Dependencies
        working-directory: ./teacher_app
        run: flutter pub get

      - name: Build APK
        working-directory: ./teacher_app
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: teacher_app/build/app/outputs/flutter-apk/app-release.apk
